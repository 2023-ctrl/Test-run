<!DOCTYPE html>
<html>
<head>
    <title>Question for Tricia Kaye</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            padding-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        h1 { 
            color: #fff; 
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .poem {
            color: #fff;
            font-size: 1.2em;
            font-style: italic;
            margin: 20px 0 40px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .gif-container {
            margin: 20px 0;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gif-container img {
            max-width: 300px;
            max-height: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 40px auto;
            flex-wrap: wrap;
            position: relative;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #yesBtn { 
            background-color: #4CAF50;
            color: white;
            position: relative;
        }
        #yesBtn:hover {
            background-color: #45a049;
            transform: scale(1.1);
            font-size: 20px;
        }
        #noBtn { 
            position: absolute;
            background-color: #f44336;
            color: white;
        }
        #noBtn:hover {
            background-color: #da190b;
        }
        .emoji {
            font-size: 3em;
            margin: 20px 0;
        }
        .confetti {
            position: fixed;
            pointer-events: none;
        }
        .celebration-gif {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: 400px;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="emoji" id="emoji">💕</div>
    <h1>Tricia Kaye, would you go out on a date with me?</h1>
    <p class="poem">"Tricia Kaye, you make my heart sway, will you go out on a date with me today?"</p>
    
    <div class="gif-container">
        <img src="https://media.giphy.com/media/KNDIqOvLjV4d2/giphy.gif" alt="Cute love animation">
    </div>
    
    <div class="button-container">
        <button id="yesBtn" onclick="celebrate()">Yes! 💚</button>
        <button id="noBtn" onmouseover="moveButton()" onmouseout="wiggle()">No</button>
    </div>

    <img class="celebration-gif" id="celebrationGif" src="https://media.giphy.com/media/g9GWusSQStVKg/giphy.gif" alt="Celebration">

    <script>
        function moveButton() {
            var btn = document.getElementById('noBtn');
            var x = Math.random() * (window.innerWidth - 150);
            var y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            changeNoButtonText();
        }

        function wiggle() {
            var btn = document.getElementById('noBtn');
            btn.style.transform = 'rotate(' + (Math.random() * 10 - 5) + 'deg)';
        }

        function changeNoButtonText() {
            var btn = document.getElementById('noBtn');
            var texts = ['No', 'Try again!', 'Nope', 'Maybe?', 'Almost there...', 'Keep trying!'];
            btn.textContent = texts[Math.floor(Math.random() * texts.length)];
        }

        function celebrate() {
            alert('Yay! See you then! 🎉 You\'ve made me the happiest!');
            createConfetti();
            changeEmoji();
            showCelebrationGif();
        }

        function showCelebrationGif() {
            var gif = document.getElementById('celebrationGif');
            gif.style.display = 'block';
            setTimeout(() => {
                gif.style.display = 'none';
            }, 4000);
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = ['💕', '🌹', '✨', '💑', '🎉'][Math.floor(Math.random() * 5)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.fontSize = '2em';
                confetti.style.animation = `fall ${2 + Math.random() * 3}s linear forwards`;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function changeEmoji() {
            var emojis = ['💕', '💑', '🌹', '✨', '💏', '🎊'];
            var emojiDiv = document.getElementById('emoji');
            setInterval(() => {
                emojiDiv.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            }, 500);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
