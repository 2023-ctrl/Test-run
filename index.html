<!DOCTYPE html>
<html>
<head>
    <title>Question for Tricia Kaye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { 
            color: #fff; 
            font-size: 4em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .poem {
            color: #fff;
            font-size: 2em;
            font-style: italic;
            margin: 30px 0 60px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .photo-container {
            margin: 40px 0;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .photo-container img {
            max-width: 500px;
            max-height: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: rgba(255,255,255,0.1);
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin: 60px auto;
            flex-wrap: wrap;
            position: relative;
        }
        button { 
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #yesBtn { 
            padding: 40px 80px; 
            font-size: 48px;
            background-color: #4CAF50;
            color: white;
            position: relative;
            z-index: 10;
        }
        #yesBtn:hover {
            background-color: #45a049;
            transform: scale(1.15);
            font-size: 52px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        #noBtn { 
            position: fixed;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #f44336;
            color: white;
            z-index: 5;
        }
        #noBtn:hover {
            background-color: #da190b;
            transform: scale(0.9);
        }
        .emoji {
            font-size: 5em;
            margin: 30px 0;
        }
        .confetti {
            position: fixed;
            pointer-events: none;
        }
        .celebration-gif {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: 600px;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji" id="emoji">💕</div>
        <h1>Tricia Kaye, would you go on another date with me?</h1>
        <p class="poem">"Let's make more memories together, will you go on another date with me?"</p>
        
        <div class="photo-container">
            <img src="photo.jpg" alt="Us together">
        </div>
        
        <div class="button-container">
            <button id="yesBtn" onclick="celebrate()">Yes! 💚</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <img class="celebration-gif" id="celebrationGif" src="https://media3.giphy.com/media/g9GWusSQStVKg/giphy.gif?cid=ecf05e47&rid=giphy.gif&ct=g" alt="Celebration">

    <script>
        function moveButton() {
            var btn = document.getElementById('noBtn');
            var x = Math.random() * (window.innerWidth - 150);
            var y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            changeNoButtonText();
        }

        function changeNoButtonText() {
            var btn = document.getElementById('noBtn');
            var texts = ['No', 'Try again!', 'Nope', 'Maybe?', 'Almost there...', 'Keep trying!'];
            btn.textContent = texts[Math.floor(Math.random() * texts.length)];
        }

        function celebrate() {
            alert('Yay! See you then! 🎉 You\'ve made me the happiest!');
            createConfetti();
            changeEmoji();
            showCelebrationGif();
        }

        function showCelebrationGif() {
            var gif = document.getElementById('celebrationGif');
            gif.style.display = 'block';
            setTimeout(() => {
                gif.style.display = 'none';
            }, 4000);
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = ['💕', '🌹', '✨', '💑', '🎉'][Math.floor(Math.random() * 5)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.fontSize = '2em';
                confetti.style.animation = `fall ${2 + Math.random() * 3}s linear forwards`;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function changeEmoji() {
            var emojis = ['💕', '💑', '🌹', '✨', '💏', '🎊'];
            var emojiDiv = document.getElementById('emoji');
            setInterval(() => {
                emojiDiv.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            }, 500);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
