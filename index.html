<!DOCTYPE html>
<html>
<head>
    <title>Question for Tricia Kaye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { 
            color: #fff; 
            font-size: 4em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .poem {
            color: #fff;
            font-size: 2em;
            font-style: italic;
            margin: 30px 0 60px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .photo-container {
            margin: 40px 0;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .photo-container img {
            max-width: 500px;
            max-height: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: rgba(255,255,255,0.1);
        }
        .button-container {
            display: flex;
            /* stack buttons vertically so No appears below Yes */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px auto;
            position: relative;
        }
        button { 
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.25s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #yesBtn { 
            padding: 20px 40px; 
            font-size: 36px;
            background-color: #4CAF50;
            color: white;
            position: relative;
            z-index: 10;
        }
        #yesBtn:hover {
            background-color: #45a049;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        #noBtn { 
            /* make No a normal positioned button below Yes */
            position: relative;
            padding: 12px 28px;
            font-size: 18px;
            background-color: #f44336;
            color: white;
            z-index: 5;
        }
        #noBtn:hover {
            background-color: #da190b;
            transform: scale(1.02);
        }
        .emoji {
            font-size: 5em;
            margin: 30px 0;
        }
        .confetti {
            position: fixed;
            pointer-events: none;
            will-change: transform, opacity;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* Responsive adjustments */
        @media (max-width: 500px) {
            h1 { font-size: 2em; }
            .poem { font-size: 1.2em; }
            .photo-container img { width: 240px; }
            #yesBtn { font-size: 28px; padding: 14px 28px; }
            #noBtn { font-size: 16px; padding: 10px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji" id="emoji">💕</div>
        <h1>Tricia Kaye, would you go on another date with me?</h1>
        <p class="poem">"Let's make more memories together, will you go on another date with me?"</p>
        
        <div class="photo-container">
            <img src="image_2.png" alt="Couple Selfie" style="width:300px; border-radius:15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin-bottom: 20px;">
        </div>
        
        <div class="button-container">
            <button id="yesBtn" onclick="celebrate()">Yes! 💚</button>
            <button id="noBtn" onclick="noClicked()">No</button>
        </div>
    </div>

    <script>
        let emojiInterval = null;

        function noClicked() {
            // simple friendly response when No is clicked
            alert("It's okay — thank you for being honest. 💛");
        }

        function celebrate() {
            alert('Yay! See you then! 🎉 You\'ve made me the happiest!');
            createConfetti();
            changeEmoji();
        }

        function createConfetti() {
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = ['💕', '🌹', '✨', '💑', '🎉'][Math.floor(Math.random() * 5)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.fontSize = (14 + Math.random() * 26) + 'px';
                confetti.style.animation = `fall ${2 + Math.random() * 3}s linear forwards`;
                document.body.appendChild(confetti);

                setTimeout(() => {
                    if (confetti && confetti.parentNode) confetti.parentNode.removeChild(confetti);
                }, 6000);
            }
        }

        function changeEmoji() {
            const emojis = ['💕', '💑', '🌹', '✨', '💏', '🎊'];
            const emojiDiv = document.getElementById('emoji');
            if (emojiInterval) clearInterval(emojiInterval);

            emojiInterval = setInterval(() => {
                emojiDiv.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            }, 300);

            setTimeout(() => {
                if (emojiInterval) {
                    clearInterval(emojiInterval);
                    emojiInterval = null;
                }
                emojiDiv.textContent = '💚';
            }, 3000);
        }
    </script>
</body>
</html>
